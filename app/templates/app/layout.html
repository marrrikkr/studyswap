<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySwap | Студенты помогают студентам</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg: #050505;
            --panel: #0f0f0f;
            --accent: #00ff41;
            --border: rgba(255, 255, 255, 0.07);
            --text-dim: #666;
        }

        /* Обнуляем старые стили и ставим твой новый темный фон */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: var(--bg) !important;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Прячем стандартную навигацию из старого шаблона */
        header, .navbar:not(.sidebar-nav) {
            display: none !important;
        }

        /* Глобальная сетка сайта */
        .app-wrapper {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        /* Стили Сайдбара (теперь они общие!) */
        .left-sidebar {
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .nav-link-custom {
            color: var(--text-dim) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

            .nav-link-custom:hover, .nav-link-custom.active {
                background: rgba(0, 255, 65, 0.1);
                color: var(--accent) !important;
            }

        /* Стили для карточек менторов в сайдбаре */
        .mentor-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
            text-decoration: none !important;
            display: block;
        }

            .mentor-item:hover {
                border-color: var(--accent);
                background: rgba(0, 255, 65, 0.05);
            }

        /* Логотип */
        .logo-link {
            text-decoration: none !important;
            display: block;
            margin-bottom: 40px;
        }

        .logo-text {
            color: var(--accent);
            font-weight: 800;
            text-align: center;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        /* Контентная область */
        .main-content, .profile-content {
            padding: 40px;
        }

        /* Кастомизация скроллбара (чтобы было красиво) */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: var(--accent);
            }
    </style>
</head>
<body>
    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
