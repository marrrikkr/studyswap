{% extends "app/layout.html" %}

{% block content %}
<style>
    .auth-wrapper {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .auth-card {
        background: #0f0f0f;
        padding: 40px;
        border-radius: 30px;
        border: 1px solid rgba(255,255,255,0.07);
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

        .auth-card h2 {
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -1px;
        }

        /* Стили для полей ввода */
        .auth-card input {
            width: 100%;
            background: #1a1a1a !important;
            border: 1px solid #333 !important;
            color: white !important;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }

            .auth-card input:focus {
                border-color: #00ff41 !important;
            }

        .auth-card label {
            color: #555;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

    .btn-auth {
        width: 100%;
        background: #fff;
        color: #000;
        border: none;
        padding: 16px;
        border-radius: 15px;
        font-weight: 800;
        transition: 0.2s;
        margin-top: 10px;
        cursor: pointer;
    }

        .btn-auth:hover {
            background: #00ff41;
            transform: scale(1.02);
        }

    /* Блок ошибок */
    .error-msg {
        background: rgba(255, 68, 68, 0.1);
        color: #ff4444;
        padding: 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 68, 68, 0.2);
        text-align: center;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Вход в StudySwap</h2>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
            <div class="error-msg">
                Неверный логин или пароль. Попробуйте снова.
            </div>
            {% endif %}

            <label for="id_username">Логин</label>
            <input type="text" name="username" id="id_username" required autofocus>

            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" required>

            <button type="submit" class="btn-auth">ВОЙТИ В АККАУНТ</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="{% url 'register' %}" style="color: #666; text-decoration: none; font-size: 0.9rem;">
                Нет аккаунта? <span style="color: #00ff41; font-weight: 800;">Создать</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
